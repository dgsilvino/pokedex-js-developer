<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokedex</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
      integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./assets/css/global.css" />
    <link rel="stylesheet" href="./assets/css/pokedex.css" />
  </head>

  <body>
    <section class="content">
      <div class="pokedex-lens"></div>

      <div class="header-logos">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg"
          alt="Pokémon Logo"
          class="pokemon-logo"
        />
        <h1 class="visually-hidden">Pokedex</h1>
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/5/53/Pok%C3%A9_Ball_icon.svg"
          alt="Pokébola"
          class="pokeball-icon"
        />
      </div>

      <div class="search-container">
        <input
          type="text"
          id="searchInput"
          placeholder="Buscar Pokémon por nome ou número..."
        />
        <div id="typeFilters" class="filters">
          <button class="filter-btn" data-type="all">Todos</button>
          <button class="filter-btn fire" data-type="fire">Fire</button>
          <button class="filter-btn water" data-type="water">Water</button>
          <button class="filter-btn grass" data-type="grass">Grass</button>
          <button class="filter-btn electric" data-type="electric">
            Electric
          </button>
        </div>
      </div>

      <ol id="pokemonList" class="pokemons"></ol>

      <div class="pagination">
        <button id="loadMoreButton" type="button">Carregando mais...</button>
      </div>
    </section>
    <div id="pokedexModal" class="modal-overlay">
      <div class="pokedex-modal-container">
        <button id="closeModalButton" class="pokedex-close-btn"></button>

        <div id="modalContent" class="modal-content-screen"></div>
      </div>
    </div>

    <script src="./assets/js/pokemon-model.js"></script>
    <script src="./assets/js/poke-api.js"></script>
    <script src="./assets/js/main.js"></script>
  </body>
</html>
